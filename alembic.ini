# Alembic — AtaraxiaDive
# Un alembic.ini por proyecto; script_location apunta al BC activo.
# Para correr migraciones de otro BC: alembic --config alembic.ini -x bc=torneo upgrade head

[alembic]
script_location = %(here)s/src/competencia/infrastructure/migrations
prepend_sys_path = .
path_separator = os

# SQLite — BC Competencia (ADR-007)
sqlalchemy.url = sqlite:///data/competencia.db

[post_write_hooks]
# Formatear automáticamente los archivos de migración generados
hooks = ruff
ruff.type = exec
ruff.executable = ruff
ruff.options = check --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
