services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ataraxiadive
      POSTGRES_USER: ataraxia
      POSTGRES_PASSWORD: ataraxia_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://ataraxia:ataraxia_dev@db:5432/ataraxiadive
    volumes:
      - .:/app
    depends_on:
      - db

volumes:
  postgres_data:
