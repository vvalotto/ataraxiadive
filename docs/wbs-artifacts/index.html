<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AtaraxiaDive — Consola Visual del Proyecto</title>
  <style>
    :root{
      --bg:#07111f;--panel:rgba(15,23,42,.86);--card:rgba(30,41,59,.88);--text:#e5e7eb;--muted:#94a3b8;--line:rgba(148,163,184,.22);--blue:#38bdf8;--violet:#a78bfa;--green:#22c55e;--yellow:#facc15;--gray:#64748b;
    }
    *{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text);background:radial-gradient(circle at 10% 5%,rgba(56,189,248,.24),transparent 30%),radial-gradient(circle at 90% 15%,rgba(167,139,250,.18),transparent 28%),var(--bg)}
    header{padding:28px 38px 16px;border-bottom:1px solid var(--line);background:rgba(7,17,31,.92);backdrop-filter:blur(14px);position:sticky;top:0;z-index:20}h1{margin:0 0 8px;font-size:clamp(30px,4vw,50px);letter-spacing:-.045em}.subtitle{color:var(--muted);max-width:1050px;line-height:1.55}.tabs{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}.tab{border:1px solid var(--line);background:#020617;color:var(--text);border-radius:999px;padding:10px 15px;cursor:pointer}.tab.active,.tab:hover{border-color:var(--blue);background:#082f49}
    main{padding:24px 38px 42px;display:grid;gap:20px}.control{display:flex;gap:10px;flex-wrap:wrap;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:22px;padding:14px}select,input,button{background:#020617;color:var(--text);border:1px solid var(--line);border-radius:999px;padding:10px 14px}input{min-width:270px;border-radius:14px}.view{display:none}.view.active{display:block}.grid{display:grid;grid-template-columns:minmax(350px,1fr) 380px;gap:20px}.panel{background:var(--panel);border:1px solid var(--line);border-radius:26px;padding:22px;box-shadow:0 24px 65px rgba(2,6,23,.34)}.side{position:sticky;top:145px;align-self:start}.muted{color:var(--muted);line-height:1.55}.badge{display:inline-flex;border:1px solid rgba(148,163,184,.25);background:rgba(2,6,23,.62);border-radius:999px;padding:5px 9px;font-size:12px;color:#dbeafe;margin:3px}.green{color:#bbf7d0}.yellow{color:#fef3c7}.blue{color:#bae6fd}
    .cards3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.hcard{min-height:310px;background:var(--card);border:1px solid var(--line);border-radius:26px;padding:20px;cursor:pointer;transition:.18s}.hcard:hover,.hcard.active{transform:translateY(-4px);border-color:var(--blue);background:rgba(8,47,73,.78)}.eyebrow{text-transform:uppercase;letter-spacing:.13em;font-size:12px;font-weight:900;color:var(--blue)}.hcard h2{font-size:28px;letter-spacing:-.035em}.question{font-size:18px;font-weight:760;color:#e0f2fe;line-height:1.35}.spbox{border:1px solid var(--line);background:rgba(2,6,23,.62);border-radius:16px;padding:13px;margin-top:10px;cursor:pointer}.spbox:hover,.spbox.active{border-color:var(--blue);background:#082f49}
    .timeline{position:relative;display:grid;gap:16px;padding-left:26px}.timeline:before{content:"";position:absolute;left:8px;top:8px;bottom:8px;width:2px;background:linear-gradient(var(--blue),var(--violet))}.event{display:grid;grid-template-columns:120px 1fr;gap:16px;position:relative}.event:before{content:"";position:absolute;left:-24px;top:20px;width:14px;height:14px;border-radius:50%;background:var(--gray)}.event.done:before{background:var(--green)}.event.progress:before{background:var(--yellow)}.event-card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:15px;cursor:pointer}.event-card:hover,.event-card.active{border-color:var(--blue);background:#082f49}.date{color:var(--muted);font-weight:700;padding-top:14px;font-size:13px}.event-card h3{margin:0 0 7px}.event-card p{margin:0;color:var(--muted);line-height:1.45}
    .tree ul{list-style:none;margin:8px 0 0 22px;padding-left:18px;border-left:1px dashed rgba(148,163,184,.25)}.tree,.tree li{list-style:none;padding-left:0}.node-row{display:inline-flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:9px 11px;margin:5px 0;cursor:pointer}.node-row:hover,.node-row.active{background:#082f49;border-color:var(--blue)}.dot{width:10px;height:10px;border-radius:50%;background:var(--gray);box-shadow:0 0 14px currentColor}.dot.done{background:var(--green);color:var(--green)}.dot.progress{background:var(--yellow);color:var(--yellow)}.level{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:3px 7px}.hidden{display:none!important}
    @media(max-width:1050px){header,main{padding-left:18px;padding-right:18px}.grid,.cards3{grid-template-columns:1fr}.side{position:static}.event{grid-template-columns:1fr}.date{padding-top:0}}
  </style>
</head>
<body>
<header>
  <h1>Consola Visual — AtaraxiaDive</h1>
  <div class="subtitle">Dashboard integrado de la organización del proyecto: horizontes estratégicos, ciclo de vida y WBS jerárquica. Las vistas comparten selección: elegir un horizonte o SP filtra y resalta las demás.</div>
  <nav class="tabs">
    <button class="tab active" data-tab="horizons">Horizontes</button>
    <button class="tab" data-tab="timeline">Timeline</button>
    <button class="tab" data-tab="wbs">WBS</button>
  </nav>
</header>
<main>
  <section class="control">
    <button id="reset">Ver todo</button>
    <select id="horizonFilter"><option value="all">Todos los horizontes</option><option value="validar">Horizonte 1 — Validar</option><option value="construir">Horizonte 2 — Construir</option><option value="producir">Horizonte 3 — Producir</option></select>
    <select id="spFilter"><option value="all">Todos los SP</option></select>
    <input id="search" placeholder="Buscar en WBS: juez, offline, ranking..." />
  </section>

  <section id="horizons" class="view active">
    <div class="grid"><div class="panel"><div class="cards3" id="horizonCards"></div></div><aside class="panel side" id="detail"></aside></div>
  </section>

  <section id="timeline" class="view">
    <div class="grid"><div class="panel"><div class="timeline" id="timelineList"></div></div><aside class="panel side" id="timelineDetail"></aside></div>
  </section>

  <section id="wbs" class="view">
    <div class="grid"><div class="panel"><ul class="tree" id="tree"></ul></div><aside class="panel side" id="wbsDetail"></aside></div>
  </section>
</main>
<script>
const sps=[{id:'sp1',h:'validar',title:'SP1 — La Performance',date:'2026-03-24',tag:'v0.2.0',bl:'BL-001',status:'done',desc:'Walking skeleton: performance registrada de punta a punta por un juez en celular.'},{id:'sp2',h:'validar',title:'SP2 — La Competencia',date:'2026-03-28',tag:'v0.3.0',bl:'BL-002',status:'done',desc:'Disciplina completa con grilla, secuencia de atletas, andariveles y ranking.'},{id:'sp3',h:'construir',title:'SP3 — El Torneo',date:'2026-04-04',tag:'v0.4.0',bl:'BL-003',status:'done',desc:'Ciclo completo del torneo con inscripción, roles y resultados.'},{id:'sp4',h:'construir',title:'SP4 — La Plataforma',date:'2026-04-18',tag:'v0.5.0',bl:'BL-004',status:'done',desc:'PWA, offline-first, notificaciones, auditoría y exportación.'},{id:'sp5',h:'producir',title:'SP5 — La Puesta en Marcha',date:'2026-05-01',tag:'v0.6.0',bl:'BL-005',status:'done',desc:'Portal organizador, portal atleta, identidad extendida, inscripción y algoritmo FAAS.'},{id:'sp6',h:'producir',title:'SP6 — Validación, Ajustes y Despliegue',date:'2026-05-05+',tag:'v1.0.0',bl:'BL-006',status:'progress',desc:'Ajustes, UAT integral y despliegue final v1.0.'}];
const horizons={validar:{num:'Horizonte 1',title:'Validar',q:'¿El entorno funciona integrado?',desc:'Verifica si CM, Dev Kit, Software Limpio, IEDD, DDD, quality gates y Git operan como sistema.',criterion:'BL-002 con métricas reales, 15+ US-IEDD trazadas y retrospectiva documentada.'},construir:{num:'Horizonte 2',title:'Construir',q:'¿IEDD sobrevive al dominio real?',desc:'Expone el enfoque a torneo, roles, offline-first, reglas deportivas, datos reales y deuda técnica.',criterion:'Torneo completo simulado y evidencia para paper IEDD + IA.'},producir:{num:'Horizonte 3',title:'Producir',q:'¿El conocimiento fluye al producto intelectual?',desc:'Busca cerrar v1.0, validar con tres roles, desplegar y capitalizar aprendizaje académico.',criterion:'Torneo real, capítulos del libro DDD y paper sobre IEDD + IA.'}};
const wbs={id:'root',h:'all',sp:'all',level:'Proyecto',title:'AtaraxiaDive',status:'progress',desc:'Plataforma web para torneos de apnea y experimento IEDD + DDD.',children:[{id:'h-validar',h:'validar',sp:'all',level:'Horizonte',title:'Horizonte 1 — Validar',status:'done',desc:horizons.validar.q,children:[{id:'sp1',h:'validar',sp:'sp1',level:'SP',title:'SP1 — La Performance',status:'done',desc:sps[0].desc,children:[n('INC-1.1 — Fundación técnica','sp1'),n('INC-1.2 — El dominio habla','sp1'),n('INC-1.3 — El juez ve y toca','sp1'),n('INC-1.4 — Todo conectado','sp1')]},{id:'sp2',h:'validar',sp:'sp2',level:'SP',title:'SP2 — La Competencia',status:'done',desc:sps[1].desc,children:[n('INC-2.1 — La grilla de salida','sp2'),n('INC-2.2 — Dos mecánicas, un modelo','sp2'),n('INC-2.3 — Andariveles simultáneos','sp2'),n('INC-2.4 — El ranking','sp2')]}]},{id:'h-construir',h:'construir',sp:'all',level:'Horizonte',title:'Horizonte 2 — Construir',status:'done',desc:horizons.construir.q,children:[{id:'sp3',h:'construir',sp:'sp3',level:'SP',title:'SP3 — El Torneo',status:'done',desc:sps[2].desc,children:[n('INC-3.1 — Torneo como máquina de estados','sp3'),n('INC-3.2 — La inscripción','sp3'),n('INC-3.3 — Anuncios y grillas automáticas','sp3'),n('INC-3.5 — Premiación y Overall','sp3')]},{id:'sp4',h:'construir',sp:'sp4',level:'SP',title:'SP4 — La Plataforma',status:'done',desc:sps[3].desc,children:[n('INC-4.2 — Fundación Frontend','sp4'),n('INC-4.3 — Interfaz del Juez','sp4'),n('INC-4.4 — Offline-first','sp4'),n('INC-4.5 — Notificaciones','sp4'),n('INC-4.6 — Auditoría y Exportación','sp4')]}]},{id:'h-producir',h:'producir',sp:'all',level:'Horizonte',title:'Horizonte 3 — Producir',status:'progress',desc:horizons.producir.q,children:[{id:'sp5',h:'producir',sp:'sp5',level:'SP',title:'SP5 — La Puesta en Marcha',status:'done',desc:sps[4].desc,children:[n('INC-5.1 — Panel del Organizador','sp5'),n('INC-5.5 — Inscripción Completa','sp5'),n('INC-5.6 — Algoritmo FAAS','sp5'),n('INC-5.7 — Portal del Atleta','sp5')]},{id:'sp6',h:'producir',sp:'sp6',level:'SP',title:'SP6 — Validación, Ajustes y Despliegue',status:'progress',desc:sps[5].desc,children:[n('INC-6.1 — Ajustes Juez','sp6','progress'),n('INC-6.2 — Ajustes Organizador','sp6','pending'),n('INC-6.3 — Ajustes Atleta','sp6','pending'),n('INC-6.4 — UAT Integral','sp6','pending'),n('INC-6.5 — Despliegue v1.0','sp6','pending')]}]}]};
function n(title,sp,status='done'){const h=sps.find(x=>x.id===sp).h;return{id:title,h,sp,level:'INC',title,status,desc:'Incremento asociado a '+sp.toUpperCase(),children:[]}}
let selectedH='all',selectedSP='all';
const spFilter=document.getElementById('spFilter'),hFilter=document.getElementById('horizonFilter'),search=document.getElementById('search');
function initSP(){spFilter.innerHTML='<option value="all">Todos los SP</option>'+sps.filter(x=>selectedH==='all'||x.h===selectedH).map(x=>`<option value="${x.id}">${x.title}</option>`).join('');spFilter.value=selectedSP}
function statusText(s){return s==='done'?'Finalizado':s==='progress'?'En curso':'Pendiente'}
function select(h='all',sp='all'){selectedH=h;selectedSP=sp;hFilter.value=h;initSP();renderAll()}
function renderHorizons(){const wrap=document.getElementById('horizonCards');wrap.innerHTML='';Object.entries(horizons).forEach(([id,h])=>{if(selectedH!=='all'&&selectedH!==id)return;const related=sps.filter(x=>x.h===id);const c=document.createElement('article');c.className='hcard '+(selectedH===id?'active':'');c.innerHTML=`<div class="eyebrow">${h.num}</div><h2>${h.title}</h2><div class="question">${h.q}</div><p class="muted">${h.desc}</p><div>${related.map(sp=>`<span class="badge">${sp.bl}</span>`).join('')}</div>`;c.onclick=()=>select(id,'all');wrap.appendChild(c)});renderDetail()}
function renderDetail(){const d=document.getElementById('detail');const h=selectedH==='all'?null:horizons[selectedH];const list=sps.filter(x=>(selectedH==='all'||x.h===selectedH)&&(selectedSP==='all'||x.id===selectedSP));d.innerHTML=h?`<h2>${h.num} — ${h.title}</h2><p class="question">${h.q}</p><p class="muted">${h.desc}</p><p><strong>Criterio:</strong><br><span class="muted">${h.criterion}</span></p><h3>Subproyectos</h3>${list.map(sp=>`<div class="spbox ${selectedSP===sp.id?'active':''}" onclick="select('${sp.h}','${sp.id}')"><strong>${sp.title}</strong><p class="muted">${sp.desc}</p><span class="badge">${sp.bl}</span><span class="badge">${sp.tag}</span></div>`).join('')}`:`<h2>Vista global</h2><p class="muted">Seleccioná un horizonte o SP para filtrar todas las vistas. Esta consola permite contar el proyecto por propósito, tiempo y estructura.</p>`}
function renderTimeline(){const t=document.getElementById('timelineList');t.innerHTML='';sps.filter(sp=>(selectedH==='all'||sp.h===selectedH)&&(selectedSP==='all'||sp.id===selectedSP)).forEach(sp=>{const e=document.createElement('article');e.className='event '+sp.status;e.innerHTML=`<div class="date">${sp.date}</div><div class="event-card ${selectedSP===sp.id?'active':''}"><h3>${sp.title}</h3><p>${sp.desc}</p><span class="badge ${sp.status==='done'?'green':'yellow'}">${statusText(sp.status)}</span><span class="badge">${sp.bl}</span><span class="badge">${sp.tag}</span></div>`;e.querySelector('.event-card').onclick=()=>select(sp.h,sp.id);t.appendChild(e)});document.getElementById('timelineDetail').innerHTML=selectedSP==='all'?'<h2>Timeline filtrado</h2><p class="muted">Elegí un SP para ver detalle. También podés filtrar desde Horizontes.</p>':spDetail(sps.find(x=>x.id===selectedSP))}
function spDetail(sp){return `<h2>${sp.title}</h2><p class="muted">${sp.desc}</p><p><span class="badge">${sp.bl}</span><span class="badge">${sp.tag}</span><span class="badge ${sp.status==='done'?'green':'yellow'}">${statusText(sp.status)}</span></p><p class="muted">Lectura: unidad de valor con cierre por baseline y tag. Sirve para mostrar avance verificable, no “tareas sueltas con ansiedad”.</p>`}
function renderTree(){const root=document.getElementById('tree');root.innerHTML='';root.appendChild(treeNode(wbs));filterTree();document.getElementById('wbsDetail').innerHTML='<h2>WBS integrada</h2><p class="muted">Los filtros superiores también afectan esta vista. Hacé clic en cualquier nodo para ver detalle.</p>'}
function treeNode(node){const li=document.createElement('li');li.dataset.h=node.h;li.dataset.sp=node.sp;li.dataset.search=(node.title+' '+node.desc).toLowerCase();const row=document.createElement('div');row.className='node-row '+(selectedSP!=='all'&&node.sp===selectedSP?'active':'');row.innerHTML=`<span class="dot ${node.status}"></span><span class="level">${node.level}</span><strong>${node.title}</strong>`;row.onclick=(ev)=>{ev.stopPropagation();document.getElementById('wbsDetail').innerHTML=`<h2>${node.title}</h2><p class="muted">${node.desc}</p><span class="badge">${node.level}</span><span class="badge ${node.status==='done'?'green':node.status==='progress'?'yellow':''}">${statusText(node.status)}</span>`;if(node.level==='SP')select(node.h,node.sp);else if(node.level==='Horizonte')select(node.h,'all')};li.appendChild(row);if(node.children?.length){const ul=document.createElement('ul');node.children.forEach(ch=>ul.appendChild(treeNode(ch)));li.appendChild(ul)}return li}
function filterTree(){const q=search.value.toLowerCase().trim();document.querySelectorAll('#tree li').forEach(li=>{const mh=selectedH==='all'||li.dataset.h==='all'||li.dataset.h===selectedH;const ms=selectedSP==='all'||li.dataset.sp==='all'||li.dataset.sp===selectedSP;const mq=!q||li.dataset.search.includes(q);li.classList.toggle('hidden',!(mh&&ms&&mq))})}
function renderAll(){initSP();renderHorizons();renderTimeline();renderTree()}
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.getElementById(b.dataset.tab).classList.add('active')});
hFilter.onchange=()=>select(hFilter.value,'all');spFilter.onchange=()=>select(selectedH,spFilter.value);search.oninput=filterTree;document.getElementById('reset').onclick=()=>{search.value='';select('all','all')};
initSP();renderAll();
</script>
</body>
</html>
